<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #items div {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        #items div.dragging {
            opacity: 0.5;
        }

        #items p {
            margin: 0;
            flex-grow: 1;
            margin-right: 10px;
        }

        button {
            margin-left: 5px;
            cursor: pointer;
        }

        input[type="text"] {
            flex-grow: 1;
            margin-right: 10px;
            padding: 4px;
        }

        .filter-btn {
            margin-right: 5px;
        }

        body.dark {
            background-color: #121212;
            color: #ffffff;
        }

        body.dark #items div {
            background-color: #1e1e1e;
            box-shadow: 0 2px 5px rgba(255, 255, 255, 0.1);
        }

        body.dark button {
            background-color: #333;
            color: white;
        }

        body.dark input {
            background-color: #222;
            color: white;
            border: 1px solid #555;
        }
    </style>
</head>

<body>

    <h1>ToDo List</h1>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <div>
        <input id="itemInput" type="text" placeholder="Add an item" />
        <input id="dateInput" type="date">
        <input id="categoryInput" type="text" placeholder="Kategorie / Tag" />
        <button id="addBtn" onclick="addItem()" disabled>Add Item</button>
    </div>

    <div style="margin-top:10px;">
        <input id="searchInput" type="text" placeholder="Search..." oninput="renderItems()" />
    </div>

    <h2>Items</h2>
    <div id="items"></div>

    <h2>Filter</h2>
    <button class="filter-btn" onclick="setFilter('all')">Alle</button>
    <button class="filter-btn" onclick="setFilter('active')">Unerledigt</button>
    <button class="filter-btn" onclick="setFilter('done')">Erledigt</button>
    <button onclick="clearCompleted()">Erledigte löschen</button>
    <script src="index.js"></script>

</body>

</html>
