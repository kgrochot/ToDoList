<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>ToDo List</h1>
        <button id="darkMode" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </header>

    <!-- ADD ITEM -->
    <div class="add-item">
        <input id="itemInput" type="text" placeholder="Add an item">
        
        <input id="dateInput" type="date">
        <input id="categoryInput" type="text" placeholder="Kategorie / Tag">
        <button id="addBtn" onclick="addItem()" disabled>Add Item</button>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Search..." oninput="renderItems()">
    </div>

    <!-- ITEMS LIST -->
    <div id="items"></div>

    <!-- FILTERS -->
    <div class="filters">
        <button class="filter-btn" onclick="setFilter('all')">Alle</button>
        <button class="filter-btn" onclick="setFilter('active')">Unerledigt</button>
        <button class="filter-btn" onclick="setFilter('done')">Erledigt</button>
        <button onclick="clearCompleted()">Erledigte löschen</button>
    </div>

    <script src="index.js"></script>
</body>

</html>
