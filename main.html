<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="todo-app-container">
        <!-- HEADER -->
        <header>
            <h1>Zu <span class="highlight">tun</span> & zu <span class="highlight">Lassen</span></h1>
            <button id="darkMode">🌙 Dark Mode</button>
        </header>

        <!-- ADD ITEM -->
        <div class="add-item">
            <input type="text" id="itemInput" placeholder="Neue Aufgabe...">
            <input type="date" id="dateInput">
            <input type="text" id="categoryInput" placeholder="Kategorie">
            <button id="addBtn" onclick="addItem()" disabled>Hinzufügen</button>
            <!-- Datei-Input, versteckt -->
            <input type="file" id="icsFileInput" accept=".ics" style="display:none;">

            
            <!-- Button zum Öffnen des Datei-Dialogs -->
            <button id="importBtn">Importieren aus Google Kalender</button>
            <button onclick="clearAll()">Alles löschen</button>
        </div>

        <!-- SEARCH BAR -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Suche...">
        </div>

        <!-- TABS -->
        <div id="tabs">
            <button onclick="setTab('today', event)">Heute</button>
            <button onclick="setTab('week', event)">Woche</button>
            <button onclick="setTab('month', event)">Monat</button>
            <button onclick="setTab('all', event)" class="active">Alle</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <button onclick="setFilter('all', event)">Alle</button>
            <button onclick="setFilter('active', event)">Nicht erledigt</button>
            <button onclick="setFilter('done', event)">Erledigt</button>
        </div>

        <!-- EXPORT -->
        <div class="export-buttons">
            <button onclick="exportJSON()">Export JSON</button>
            <button onclick="exportCSV()">Export CSV</button>
            <button onclick="printTasks()">Drucken</button>
        </div>

        <!-- ITEMS -->
        <div id="items"></div>
    </div>

    <script src="index.js"></script>
</body>

</html>
